<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Operador â€” GIU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --accent: #ea580c; --accent-dark: #c2410c; --accent-bg: #fff7ed; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #f1f5f9; }
        nav.navbar {
            background: var(--accent);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            box-shadow: 0 1px 4px rgba(0,0,0,.15);
        }
        .nav-brand { display: flex; align-items: center; gap: 10px; }
        .nav-logo {
            background: rgba(255,255,255,.2);
            color: #fff;
            width: 34px; height: 34px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: .8rem; font-weight: 700;
        }
        .nav-title { color: #fff; font-weight: 600; font-size: .95rem; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-email { color: rgba(255,255,255,.8); font-size: .8rem; }
        .nav-role {
            background: rgba(255,255,255,.2);
            color: #fff;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: .73rem;
            font-weight: 600;
        }
        .nav-logout {
            color: #fff;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 6px;
            background: rgba(255,255,255,.15);
            font-size: .82rem;
            font-weight: 500;
            transition: background .14s;
        }
        .nav-logout:hover { background: rgba(255,255,255,.28); }
        .container { max-width: 1200px; margin: 32px auto; padding: 0 24px; }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .page-header h2 { font-size: 1.1rem; font-weight: 700; color: #0f172a; }
        .stat-chip {
            background: var(--accent-bg);
            color: var(--accent-dark);
            border: 1px solid #fed7aa;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: .8rem;
            font-weight: 600;
        }
        .quick-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 28px; }
        .quick-card {
            background: #fff;
            border-radius: 10px;
            padding: 16px 18px;
            box-shadow: 0 1px 3px rgba(0,0,0,.07);
            border-left: 3px solid var(--accent);
        }
        .quick-card h4 { font-size: .84rem; font-weight: 600; color: #0f172a; margin-bottom: 4px; }
        .quick-card p { font-size: .77rem; color: #94a3b8; line-height: 1.4; }
        .section-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,.07);
            overflow: hidden;
        }
        .section-header {
            padding: 16px 22px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .section-header h3 { font-size: .95rem; font-weight: 600; color: #0f172a; }
        .empty-msg {
            padding: 48px 24px;
            text-align: center;
            color: #94a3b8;
            font-size: .9rem;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #f8fafc;
            padding: 11px 16px;
            text-align: left;
            font-size: .75rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: .5px;
            border-bottom: 1px solid #e2e8f0;
        }
        td {
            padding: 13px 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: .875rem;
            color: #334155;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }
        .td-id { color: #94a3b8; font-size: .8rem; }
        .desc-link {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            font-size: .82rem;
            font-weight: 500;
            border-bottom: 1px dashed var(--accent);
        }
        .desc-link:hover { color: var(--accent-dark); }
        .estado-select {
            padding: 5px 10px;
            border: 1.5px solid #e2e8f0;
            border-radius: 6px;
            font-size: .8rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: border-color .14s;
            outline: none;
            min-width: 150px;
        }
        .estado-select:focus { border-color: var(--accent); }
        /* --- Categoria chip picker --- */
        .cat-picker { position: relative; min-width: 200px; }
        .cat-chips-area {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 6px 8px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            background: #fff;
            min-height: 36px;
            cursor: pointer;
            transition: border-color .14s;
        }
        .cat-chips-area:hover { border-color: #cbd5e1; }
        .cat-chips-area.open { border-color: var(--accent); border-radius: 8px 8px 0 0; }
        .cat-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #fff7ed;
            color: var(--accent-dark);
            border: 1px solid #fed7aa;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: .72rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .cat-chip-remove {
            cursor: pointer;
            font-size: .8rem;
            line-height: 1;
            opacity: .6;
            transition: opacity .12s;
        }
        .cat-chip-remove:hover { opacity: 1; }
        .cat-placeholder {
            color: #94a3b8;
            font-size: .8rem;
            padding: 2px 0;
        }
        .cat-dropdown {
            display: none;
            position: fixed;
            z-index: 9999;
            background: #fff;
            border: 1.5px solid var(--accent);
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 240px;
            overflow-y: auto;
            box-shadow: 0 8px 24px rgba(0,0,0,.15);
        }
        .cat-dropdown.show { display: block; }
        .cat-dropdown label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            font-size: .8rem;
            color: #334155;
            cursor: pointer;
            transition: background .1s;
        }
        .cat-dropdown label:hover { background: #fff7ed; }
        .cat-dropdown input[type="checkbox"] {
            width: 15px; height: 15px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
        }
        .btn-cat-save {
            display: block;
            width: 100%;
            margin-top: 5px;
            padding: 6px 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: .78rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background .14s;
        }
        .btn-cat-save:hover { background: var(--accent-dark); }
        .estado-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 170px;
        }
        .campo-bloqueado {
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            padding: 6px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background: #f8fafc;
            color: #334155;
            font-size: .8rem;
            font-weight: 600;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            background: rgba(0,0,0,.45);
        }
        .modal-content {
            background: #fff;
            margin: 6% auto;
            padding: 28px;
            border-radius: 12px;
            width: 90%;
            max-width: 580px;
            box-shadow: 0 8px 32px rgba(0,0,0,.18);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f1f5f9;
        }
        .modal-header h3 { font-size: 1rem; font-weight: 600; color: #0f172a; margin: 0; }
        .close-modal { color: #94a3b8; font-size: 1.4rem; cursor: pointer; line-height: 1; }
        .close-modal:hover { color: #374151; }
        .modal-body { color: #475569; font-size: .9rem; line-height: 1.65; margin-bottom: 20px; }
        .modal-footer button {
            padding: 8px 18px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: .85rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background .14s;
        }
        .modal-footer button:hover { background: var(--accent-dark); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <div class="nav-logo">GIU</div>
            <span class="nav-title">Panel Operador</span>
        </div>
        <div class="nav-right">
            <span class="nav-email" th:text="${usuario.email}"></span>
            <span class="nav-role" th:text="${rol}"></span>
            <a href="/logout" class="nav-logout">Cerrar sesión</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>Gestión de Incidencias</h2>
            <span class="stat-chip" th:text="'Total: ' + ${#lists.size(incidencias)}"></span>
        </div>

        <div class="section-card">
            <div class="section-header">
                <h3>Incidencias registradas</h3>
            </div>
            <div th:if="${#lists.isEmpty(incidencias)}" class="empty-msg">
                No hay incidencias registradas.
            </div>
            <table th:if="${!#lists.isEmpty(incidencias)}">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Categoría</th>
                        <th>Descripción</th>
                        <th>Ubicación</th>
                        <th>Fecha</th>
                        <th>Email</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="inc : ${incidencias}">
                        <td class="td-id" th:text="${inc.id}"></td>
                        <td>
                            <form method="post"
                                  th:action="@{/dashboard/operador/cambiar-categoria}"
                                  th:if="${inc.estado != T(com.giu.giu.model.EstadoIncidencia).VALIDADA and inc.estado != T(com.giu.giu.model.EstadoIncidencia).RECHAZADA}">
                                <input type="hidden" name="id" th:value="${inc.id}"/>
                                <div class="cat-picker">
                                    <div class="cat-chips-area" onclick="toggleDropdown(this)">
                                        <span th:each="cat : ${inc.categorias}" class="cat-chip"
                                              th:data-val="${cat.name()}">
                                            <span th:text="${cat.descripcion}"></span>
                                            <span class="cat-chip-remove" onclick="event.stopPropagation(); removeChip(this)">&times;</span>
                                        </span>
                                        <span class="cat-placeholder"
                                              th:if="${#sets.isEmpty(inc.categorias)}">Seleccionar…</span>
                                    </div>
                                    <div class="cat-dropdown">
                                        <label th:each="cat : ${categorias}">
                                            <input type="checkbox" name="categorias"
                                                   th:value="${cat.name()}"
                                                   th:checked="${inc.categorias.contains(cat)}"
                                                   onchange="syncChips(this)"/>
                                            <span th:text="${cat.descripcion}"></span>
                                        </label>
                                    </div>
                                </div>
                                <button type="submit" class="btn-cat-save">Guardar categorías</button>
                            </form>
                            <div th:if="${inc.estado == T(com.giu.giu.model.EstadoIncidencia).VALIDADA or inc.estado == T(com.giu.giu.model.EstadoIncidencia).RECHAZADA}"
                                 style="display:flex;flex-wrap:wrap;gap:4px;">
                                <span class="cat-chip"
                                      th:each="cat : ${inc.categorias}"
                                      th:text="${cat.descripcion}"></span>
                            </div>
                        </td>
                        <td><span class="desc-link" th:onclick="'openModal(this)'" th:data-desc="${inc.descripcion}">Ver descripción</span></td>
                        <td th:text="${inc.ubicacion}"></td>
                        <td th:text="${#temporals.format(inc.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${inc.usuario.email}"></td>
                        <td>
                            <div class="estado-stack">
                                <form method="post"
                                      th:action="@{/dashboard/operador/cambiar-estado}"
                                      th:if="${inc.estado != T(com.giu.giu.model.EstadoIncidencia).VALIDADA and inc.estado != T(com.giu.giu.model.EstadoIncidencia).RECHAZADA}">
                                    <input type="hidden" name="id" th:value="${inc.id}"/>
                                    <select name="estado" class="estado-select" onchange="if (this.value) { applySelectStyle(this); this.form.submit(); }">
                                        <option value="">Validar o rechazar...</option>
                                        <option th:each="e : ${estadosOperador}" th:value="${e}" th:text="${e.descripcion}"></option>
                                    </select>
                                </form>
                                <span class="campo-bloqueado"
                                      th:if="${inc.estado == T(com.giu.giu.model.EstadoIncidencia).VALIDADA or inc.estado == T(com.giu.giu.model.EstadoIncidencia).RECHAZADA}"
                                      th:text="${inc.estado.descripcion}">
                                </span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="descModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Descripción de la incidencia</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <p id="descContent" class="modal-body"></p>
            <div class="modal-footer">
                <button onclick="closeModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
    /* --- Estado colors --- */
    var statusColors = {
        PENDIENTE_VALIDACION: { bg: '#fef3c7', color: '#92400e', border: '#f59e0b' },
        VALIDADA:             { bg: '#dcfce7', color: '#166534', border: '#4ade80' },
        ASIGNADA:             { bg: '#e0e7ff', color: '#3730a3', border: '#818cf8' },
        EN_CURSO:             { bg: '#dbeafe', color: '#1e40af', border: '#60a5fa' },
        RESUELTA:             { bg: '#d1fae5', color: '#065f46', border: '#34d399' },
        CERRADA:              { bg: '#e2e8f0', color: '#334155', border: '#94a3b8' },
        RECHAZADA:            { bg: '#fee2e2', color: '#991b1b', border: '#f87171' }
    };
    function applySelectStyle(sel) {
        var s = statusColors[sel.value];
        if (s) { sel.style.background=s.bg; sel.style.color=s.color; sel.style.borderColor=s.border; return; }
        sel.style.background='#fff'; sel.style.color='#334155'; sel.style.borderColor='#e2e8f0';
    }
    document.querySelectorAll('.estado-select').forEach(function(sel){ applySelectStyle(sel); });

    /* --- Descripción modal --- */
    function openModal(el) {
        document.getElementById('descContent').textContent = el.getAttribute('data-desc');
        document.getElementById('descModal').style.display = 'block';
    }
    function closeModal() { document.getElementById('descModal').style.display = 'none'; }

    /* --- Categoria chip picker --- */
    function toggleDropdown(chipsArea) {
        var dd = chipsArea.nextElementSibling;
        var isOpen = dd.classList.toggle('show');
        chipsArea.classList.toggle('open', isOpen);
        if (isOpen) {
            var rect = chipsArea.getBoundingClientRect();
            dd.style.left = rect.left + 'px';
            dd.style.top = rect.bottom + 'px';
            dd.style.width = rect.width + 'px';
        }
    }

    function syncChips(checkbox) {
        var picker = checkbox.closest('.cat-picker');
        var area = picker.querySelector('.cat-chips-area');
        var val = checkbox.value;
        var label = checkbox.parentElement.querySelector('span').textContent;
        if (checkbox.checked) {
            var chip = document.createElement('span');
            chip.className = 'cat-chip';
            chip.setAttribute('data-val', val);
            chip.innerHTML = '<span>' + label + '</span><span class="cat-chip-remove" onclick="event.stopPropagation(); removeChip(this)">&times;</span>';
            var ph = area.querySelector('.cat-placeholder');
            if (ph) ph.remove();
            area.appendChild(chip);
        } else {
            var existing = area.querySelector('.cat-chip[data-val="' + val + '"]');
            if (existing) existing.remove();
            if (!area.querySelector('.cat-chip')) {
                var ph2 = document.createElement('span');
                ph2.className = 'cat-placeholder';
                ph2.textContent = 'Seleccionar…';
                area.appendChild(ph2);
            }
        }
    }

    function removeChip(x) {
        var chip = x.closest('.cat-chip');
        var picker = chip.closest('.cat-picker');
        var val = chip.getAttribute('data-val');
        var cb = picker.querySelector('input[value="' + val + '"]');
        if (cb) cb.checked = false;
        chip.remove();
        var area = picker.querySelector('.cat-chips-area');
        if (!area.querySelector('.cat-chip')) {
            var ph = document.createElement('span');
            ph.className = 'cat-placeholder';
            ph.textContent = 'Seleccionar…';
            area.appendChild(ph);
        }
    }

    /* Cerrar dropdowns al hacer clic fuera */
    document.addEventListener('click', function(e) {
        if (e.target.closest('.cat-picker')) return;
        document.querySelectorAll('.cat-dropdown.show').forEach(function(dd) {
            dd.classList.remove('show');
            dd.previousElementSibling.classList.remove('open');
        });
        /* Modal */
        if (e.target === document.getElementById('descModal')) closeModal();
    });
    </script>
</body>
</html>
