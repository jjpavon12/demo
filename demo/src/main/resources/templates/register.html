<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro — GIU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0,0,0,.09);
            padding: 44px 40px;
            width: 100%;
            max-width: 410px;
        }
        .card-header { text-align: center; margin-bottom: 28px; }
        .logo-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: #1d4ed8;
            color: #fff;
            border-radius: 13px;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 14px;
        }
        h1 { font-size: 1.3rem; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
        .subtitle { font-size: .85rem; color: #64748b; }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            font-size: .78rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        input, select {
            width: 100%;
            padding: 10px 13px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: .925rem;
            font-family: inherit;
            color: #1e293b;
            background: #fff;
            transition: border-color .14s, box-shadow .14s;
        }
        input:focus, select:focus { outline: none; border-color: #1d4ed8; box-shadow: 0 0 0 3px rgba(29,78,216,.12); }
        .alert { padding: 9px 13px; border-radius: 8px; font-size: .85rem; margin-bottom: 14px; }
        .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
        .alert-info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; }
        .btn-submit {
            width: 100%;
            padding: 11px;
            background: #1d4ed8;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: .9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 4px;
            transition: background .14s, box-shadow .14s;
        }
        .btn-submit:hover { background: #1e40af; box-shadow: 0 4px 14px rgba(29,78,216,.35); }
        .footer-link { text-align: center; margin-top: 20px; font-size: .85rem; color: #64748b; }
        .footer-link a { color: #1d4ed8; font-weight: 500; text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="logo-mark">GIU</div>
            <h1>Crear cuenta</h1>
            <p class="subtitle">Regístrate para acceder al portal</p>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${registeredMessage}" class="alert alert-info" th:text="${registeredMessage}"></div>

        <form action="/registro" method="post">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input id="email" name="email" type="email" required placeholder="tu@email.com" />
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" required placeholder="Mínimo 6 caracteres" />
            </div>
            <div class="form-group">
                <label for="rol">Rol</label>
                <select id="rol" name="rol" required>
                    <option value="CIUDADANO">Ciudadano</option>
                    <option value="OPERADOR">Operador</option>
                    <option value="TECNICO">Técnico</option>
                    <option value="ADMINISTRADOR">Administrador</option>
                </select>
            </div>
            <button type="submit" class="btn-submit">Crear cuenta</button>
        </form>

        <div class="footer-link">
            ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
        </div>
    </div>
</body>
</html>
