<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - GIU</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin:0; }
        .container { width: 100%; max-width: 420px; margin: 60px auto; background:#fff; padding:30px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 20px; font-size:1.6rem; color:#333; }
        .form-group { margin-bottom: 18px; }
        label { display:block; margin-bottom:6px; color:#555; }
        input, select { width:100%; padding:11px 12px; border:1px solid #cbd5e1; border-radius:6px; font-size:1rem; }
        button { background:#667eea; color:#fff; border:none; width:100%; padding:12px; border-radius:6px; font-weight:600; cursor:pointer; }
        button:hover { background:#5568d3; }
        .alert { margin-bottom:15px; padding:10px 14px; border-radius:6px; color:#333; }
        .alert-error { background:#ffe6e6; border:1px solid #ffb3b3; }
        .alert-info { background:#e8f0fe; border:1px solid #aecbff; }
        .link { margin-top:14px; text-align:center; }
        .link a { color:#667eea; text-decoration:none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Registrarse</h1>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${registeredMessage}" class="alert alert-info" th:text="${registeredMessage}"></div>

        <form action="/registro" method="post">
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required placeholder="usuario@demo.com" />
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" required placeholder="Mínimo 6 caracteres" />
            </div>
            <div class="form-group">
                <label for="rol">Rol</label>
                <select id="rol" name="rol" required>
                    <option value="CIUDADANO">CIUDADANO</option>
                    <option value="OPERADOR">OPERADOR</option>
                    <option value="TECNICO">TECNICO</option>
                    <option value="ADMINISTRADOR">ADMINISTRADOR</option>
                </select>
            </div>
            <button type="submit">Registrarse</button>
        </form>

        <div class="link">
            <p>¿Ya tienes cuenta? <a href="/login">Iniciar sesión</a></p>
        </div>
    </div>
</body>
</html>
